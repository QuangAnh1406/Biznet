version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: biznet-db
    environment:
      POSTGRES_USER: biznet_user
      POSTGRES_PASSWORD: biznet_password
      POSTGRES_DB: biznet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - biznet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biznet_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biznet-api
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=biznet
      - DB_USER=biznet_user
      - DB_PASSWORD=biznet_password
      - BACKEND_PORT=5000
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - biznet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biznet-web
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - biznet-network

  # Adminer - Database Management UI (Optional)
  adminer:
    image: adminer:latest
    container_name: biznet-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - biznet-network

volumes:
  postgres_data:

networks:
  biznet-network:
    driver: bridge